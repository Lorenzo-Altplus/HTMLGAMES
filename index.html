<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Games - Karisma Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            color: #2d3a2e; font-family: 'Orbitron', 'Segoe UI', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .container { text-align: center; padding: 40px; }
        h1 {
            font-family: 'Black Ops One', cursive;
            font-size: 36px; margin-bottom: 8px;
            background: linear-gradient(135deg, #ff7043, #e64a19);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #43a047; font-size: 14px; letter-spacing: 2px; margin-bottom: 40px; font-weight: 700; }
        .games { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
        .game-card {
            background: rgba(255,255,255,0.92); border: 2px solid #a5d6a7;
            border-radius: 20px; padding: 30px 40px; width: 280px;
            text-decoration: none; color: #2d3a2e;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .game-card:hover {
            transform: scale(1.05); border-color: #ff7043;
            box-shadow: 0 8px 30px rgba(255, 112, 67, 0.25);
        }
        .game-emoji { font-size: 48px; margin-bottom: 12px; }
        .game-title { font-family: 'Black Ops One', cursive; font-size: 20px; margin-bottom: 6px; color: #ff7043; }
        .game-desc { font-size: 12px; color: #666; line-height: 1.5; }

        /* Password gate */
        #pw-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; gap: 16px;
        }
        #pw-gate.hidden { display: none; }
        #pw-gate h2 { font-family: 'Black Ops One', cursive; font-size: 24px; color: #43a047; }
        #pw-gate input {
            font-family: 'Orbitron', sans-serif; font-size: 16px;
            padding: 12px 20px; border: 2px solid #a5d6a7; border-radius: 12px;
            background: #fff; color: #2d3a2e; text-align: center;
            outline: none; width: 220px;
        }
        #pw-gate input:focus { border-color: #ff7043; }
        #pw-gate .pw-error { color: #e53935; font-size: 12px; height: 16px; }
        #pw-gate button {
            font-family: 'Black Ops One', cursive; font-size: 18px; color: #fff;
            background: linear-gradient(135deg, #ff7043, #e64a19);
            border: none; border-radius: 12px; padding: 12px 40px; cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Password Gate -->
    <div id="pw-gate">
        <h2>KARISMA GAMES</h2>
        <input type="password" id="pw-input" placeholder="Password" autocomplete="off">
        <div class="pw-error" id="pw-error"></div>
        <button id="pw-submit">ENTER</button>
    </div>

    <div class="container" id="main-content" style="display:none;">
        <h1>HTML GAMES</h1>
        <div class="subtitle">KARISMA COLLECTION</div>
        <div class="games">
            <a href="AnimalTower.html" class="game-card">
                <div class="game-emoji">🏗️</div>
                <div class="game-title">Animal Tower</div>
                <div class="game-desc">Stack characters on the platform!<br>60-second tower challenge.</div>
            </a>
            <a href="SuikaKarisma.html" class="game-card">
                <div class="game-emoji">🍉</div>
                <div class="game-title">Suika Karisma</div>
                <div class="game-desc">Merge characters to grow bigger!<br>Suika-style puzzle game.</div>
            </a>
            <a href="Karisma-Ragdoll.html" class="game-card">
                <div class="game-emoji">🕺</div>
                <div class="game-title">Karisma Ragdoll</div>
                <div class="game-desc">3D loading scene: dance mode<br>or grab & throw ragdoll.</div>
            </a>
        </div>
    </div>

    <script>
    (function() {
        var PASS = 'karisma2024';
        var gate = document.getElementById('pw-gate');
        var content = document.getElementById('main-content');
        var inp = document.getElementById('pw-input');
        var err = document.getElementById('pw-error');
        var btn = document.getElementById('pw-submit');

        if (localStorage.getItem('at_auth') === '1') {
            gate.classList.add('hidden');
            content.style.display = '';
        }

        function tryLogin() {
            if (inp.value === PASS) {
                localStorage.setItem('at_auth', '1');
                gate.classList.add('hidden');
                content.style.display = '';
            } else {
                err.textContent = 'Wrong password';
                inp.value = '';
                inp.focus();
            }
        }

        btn.addEventListener('click', tryLogin);
        inp.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') tryLogin();
        });
    })();
    </script>
</body>
</html>
