<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karisma Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #ffffff; font-family: system-ui, sans-serif; color: #222; }

  /* --- Loading scene layers --- */
  #bg {
    position: fixed; inset: 0; z-index: 1;
    background-image: url('karisma-assets/bg01.png');
    background-repeat: repeat;
    background-size: 480px auto;
    opacity: 0.95;
  }
  #floor {
    position: fixed; bottom: 0; left: 0; width: 100%; height: auto;
    z-index: 2; pointer-events: none;
    user-select: none;
  }
  #c {
    position: fixed; inset: 0; width: 100%; height: 100%;
    z-index: 3; background: transparent; outline: none; touch-action: none;
  }
  #now-loading {
    position: fixed; top: 24px; right: 32px;
    width: clamp(180px, 22vw, 320px);
    z-index: 4; pointer-events: none; user-select: none;
    animation: wiggle 2s ease-in-out infinite;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-1deg); }
    50%      { transform: rotate(2deg); }
  }
  #progress {
    position: fixed; bottom: 24px; left: 24px;
    width: clamp(260px, 32vw, 420px);
    z-index: 4; user-select: none;
  }

  /* action buttons */
  .btn-group {
    position: fixed; top: 24px; left: 24px; z-index: 6;
    display: flex; flex-direction: column; gap: 8px;
  }
  .btn-group button {
    background: rgba(0,0,0,0.5); color: #fff; border: 0;
    padding: 8px 14px; border-radius: 10px; cursor: pointer;
    font-family: 'Black Ops One', cursive; font-size: 14px; letter-spacing: 1px;
    backdrop-filter: blur(4px); min-width: 120px;
    transition: background .15s;
  }
  .btn-group button:hover { background: #ff5a3c; }
  .btn-group button.active { background: #ff5a3c; }

  #loading-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: #fff; font-family: 'Black Ops One', cursive; font-size: 24px; color: #888;
  }
  #loading-screen.hidden { display: none; }
  .err { color: #e53935; font-size: 14px; text-align: center; max-width: 420px; margin-top: 14px; }

  /* Password gate */
  #pw-gate {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; gap: 16px;
  }
  #pw-gate.hidden { display: none; }
  #pw-gate h2 { font-family: 'Black Ops One', cursive; font-size: 24px; color: #43a047; }
  #pw-gate input {
      font-family: 'Orbitron', sans-serif; font-size: 16px;
      padding: 12px 20px; border: 2px solid #a5d6a7; border-radius: 12px;
      background: #fff; color: #2d3a2e; text-align: center;
      outline: none; width: 220px;
  }
  #pw-gate input:focus { border-color: #ff7043; }
  #pw-gate .pw-error { color: #e53935; font-size: 12px; height: 16px; }
  #pw-gate button {
      font-family: 'Black Ops One', cursive; font-size: 18px; color: #fff;
      background: linear-gradient(135deg, #ff7043, #e64a19);
      border: none; border-radius: 12px; padding: 12px 40px; cursor: pointer;
  }
</style>
</head>
<body>

<!-- Password Gate -->
<div id="pw-gate">
    <h2>KARISMA LOADING</h2>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="off">
    <div class="pw-error" id="pw-error"></div>
    <button id="pw-submit">ENTER</button>
</div>

<!-- Scene (hidden until password) -->
<div id="scene-wrapper" style="display:none;width:100%;height:100%;">
  <div id="bg"></div>
  <img id="floor" src="karisma-assets/floor.png" alt="">
  <canvas id="c"></canvas>
  <img id="now-loading" src="karisma-assets/deco_txt_loading_02.png" alt="NOW LOADING">
  <img id="progress" src="karisma-assets/loading_01.png" alt="progress">
  <div class="btn-group">
    <button id="btn-dance">DANCE</button>
    <button id="btn-ragdoll">RAGDOLL</button>
    <button id="btn-debug" title="Mostra/nasconde wireframe dei body del ragdoll">DEBUG</button>
  </div>
  <div id="loading-screen">
    Loading…
    <div class="err" id="err"></div>
  </div>
</div>

<!-- Password gate logic (loads game on success) -->
<script>
(function() {
    const PASS = 'karisma2024';
    const gate = document.getElementById('pw-gate');
    const wrapper = document.getElementById('scene-wrapper');
    const inp = document.getElementById('pw-input');
    const err = document.getElementById('pw-error');
    const btn = document.getElementById('pw-submit');

    let started = false;
    function startGame() {
        if (started) return;
        started = true;
        gate.classList.add('hidden');
        wrapper.style.display = '';
        loadScripts();
    }
    function loadScripts() {
        const urls = [
            'https://cdn.jsdelivr.net/npm/babylonjs@6.48.1/babylon.js',
            'https://cdn.jsdelivr.net/npm/babylonjs-loaders@6.48.1/babylonjs.loaders.min.js',
            'https://cdn.jsdelivr.net/npm/@babylonjs/havok@1.3.0/lib/umd/HavokPhysics_umd.js',
            '_ragdoll_game.js?v=15'
        ];
        (function next(i){
            if (i >= urls.length) return;
            const s = document.createElement('script');
            s.src = urls[i];
            s.onload = () => next(i+1);
            s.onerror = () => {
                document.getElementById('err').textContent = 'Errore caricando: ' + urls[i];
            };
            document.body.appendChild(s);
        })(0);
    }

    if (localStorage.getItem('at_auth') === '1') startGame();
    else inp.focus();

    function tryLogin() {
        if (inp.value === PASS) {
            localStorage.setItem('at_auth', '1');
            startGame();
        } else {
            err.textContent = 'Wrong password';
            inp.value = '';
            inp.focus();
        }
    }
    btn.addEventListener('click', tryLogin);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
})();
</script>

</body>
</html>
